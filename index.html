<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Excel Companion FR — Formules & raccourcis en français</title>
  <meta name="description" content="Le référentiel des formules Excel francisées et des raccourcis clavier AZERTY. Recherche instantanée, exemples copiables, favoris." />

  <!-- Polices Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- En-tête fixe -->
  <header class="entete">
    <div class="entete-contenu">
      <a href="#" class="logo" aria-label="Excel Companion FR — accueil">
        <span class="logo-marque" aria-hidden="true">
          <span class="cell"></span><span class="cell"></span>
          <span class="cell"></span><span class="cell actif"></span>
        </span>
        <span class="logo-texte">Excel Companion <strong>FR</strong></span>
      </a>

      <div class="recherche">
        <svg class="recherche-icone" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 21l-4.3-4.3M11 19a8 8 0 1 1 0-16 8 8 0 0 1 0 16z"/></svg>
        <input
          type="search"
          id="champ-recherche"
          placeholder="Rechercher une formule ou un raccourci…"
          autocomplete="off"
          aria-label="Rechercher" />
      </div>
    </div>
  </header>

  <main class="conteneur">

    <!-- Onglets -->
    <nav class="onglets" role="tablist" aria-label="Sections">
      <button class="onglet actif" data-onglet="formules" role="tab" aria-selected="true">Formules</button>
      <button class="onglet" data-onglet="raccourcis" role="tab" aria-selected="false">Raccourcis</button>
      <button class="onglet" data-onglet="favoris" role="tab" aria-selected="false">
        Favoris <span class="compteur-favoris" id="compteur-favoris">0</span>
      </button>
    </nav>

    <!-- Filtres par catégorie -->
    <div class="filtres" id="filtres" aria-label="Filtrer par catégorie"></div>

    <!-- Zone de résultats -->
    <p class="resultat-info" id="resultat-info"></p>
    <section class="grille" id="grille" aria-live="polite"></section>

    <!-- Message si aucun résultat -->
    <div class="vide" id="vide" hidden>
      <p>Aucun résultat ne correspond à votre recherche.</p>
    </div>

  </main>

  <footer class="pied">
    <p>Excel Companion <strong>FR</strong> — référentiel des formules et raccourcis Excel en français. Séparateur d'arguments&nbsp;: le point-virgule «&nbsp;;&nbsp;».</p>
  </footer>

  <!-- Notification de copie -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
